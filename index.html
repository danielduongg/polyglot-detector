<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polyglot — guess my language</title>
<style>
  :root{ --red:#da251d; --gold:#ffce00; --cream:#fff8ee; --card:#ffffff;
         --ink:#2b2118; --muted:#9b8e7e; --bar:#efe6d6; --blue:#2c6e9b; }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:
       radial-gradient(1200px 500px at 50% -10%, #ffe9a8 0%, rgba(255,233,168,0) 60%),
       var(--cream); min-height:100vh; padding:28px 16px 60px;}
  .wrap{max-width:680px;margin:0 auto}
  .top{text-align:center;margin-bottom:18px}
  .star{color:var(--gold);text-shadow:0 1px 0 #c99a00;font-size:26px}
  h1{font-size:40px;margin:6px 0 2px;letter-spacing:.5px;
     background:linear-gradient(180deg,var(--red),#a81813);-webkit-background-clip:text;
     background-clip:text;color:transparent}
  .greet{height:30px;font-size:22px;font-weight:700;color:var(--red);transition:opacity .35s}
  .by{color:var(--muted);font-size:13.5px;margin-top:2px}
  .tagline{color:#5d5042;font-size:15px;margin:10px auto 0;max-width:520px}
  .uitog{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:16px 0 8px}
  .uitog button{border:1.5px solid #e7d9bf;background:#fff;border-radius:999px;
     padding:6px 12px;font-size:13.5px;cursor:pointer;color:#5d5042;transition:.15s}
  .uitog button.on{background:var(--red);border-color:var(--red);color:#fff;font-weight:600}
  .card{background:var(--card);border:1px solid #f0e4cd;border-radius:18px;
        box-shadow:0 12px 30px rgba(120,80,20,.10);padding:18px;margin-top:14px}
  textarea{width:100%;border:1.5px solid #ecdfc6;border-radius:14px;padding:14px;
     font-size:17px;font-family:inherit;resize:vertical;min-height:70px;outline:none;background:#fffdf8}
  textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px #ffe9a8}
  .try{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .try .lbl{color:var(--muted);font-size:13px}
  .chip{border:1px dashed #e0cfa6;background:#fffaf0;border-radius:999px;padding:5px 11px;
        font-size:13px;cursor:pointer;color:#6b5b45;transition:.15s}
  .chip:hover{background:#fff3d6;border-color:var(--gold)}
  .result{margin-top:16px}
  .hint{color:var(--muted);text-align:center;padding:18px 6px;font-size:14.5px}
  .det{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .flag{font-size:40px;line-height:1}
  .det .name{font-size:24px;font-weight:800}
  .det .pct{margin-left:auto;font-weight:800;font-size:24px;color:var(--red)}
  .det .flair{font-size:14px;color:#7a6a52}
  .bar{display:grid;grid-template-columns:120px 1fr 48px;align-items:center;gap:10px;margin:7px 0}
  .bar .bl{font-size:14px;color:#5d5042;white-space:nowrap}
  .track{height:14px;background:var(--bar);border-radius:999px;overflow:hidden}
  .fill{height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,#cdbfa6,#b7a98e);
        transition:width .35s ease}
  .bar.win .fill{background:linear-gradient(90deg,var(--gold),var(--red))}
  .bar.win .bl{font-weight:700;color:var(--ink)}
  .bp{font-size:13px;color:var(--muted);text-align:right}
  .foot{color:#7a6a52;font-size:12.5px;text-align:center;margin-top:18px;line-height:1.5}
  .foot a{color:var(--red);text-decoration:none;border-bottom:1px solid #f0c9c6}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="star">✦</div>
    <h1>Polyglot</h1>
    <div class="greet" id="greet">Xin chào</div>
    <div class="by" id="by">by Daniel · polyglot triathlete 🏊 🎾 🚴</div>
    <div class="tagline" id="tagline"></div>
    <div class="uitog" id="uitog"></div>
  </div>

  <div class="card">
    <textarea id="inp" rows="2" autofocus></textarea>
    <div class="try"><span class="lbl" id="tryl"></span><span id="chips"></span></div>
    <div class="result" id="result"></div>
  </div>

  <div class="foot">
    <div id="how"></div>
    <div style="margin-top:6px">github.com/danielduongg/polyglot-detector</div>
  </div>
</div>

let ui = "en";

function pre(t){ t=t.toLowerCase().replace(KEEP," ").replace(/\s+/g," ").trim(); return " "+t+" "; }
function* grams(t){ const s=pre(t); for(let n=MODEL.nmin;n<=MODEL.nmax;n++) for(let i=0;i+n<=s.length;i++) yield s.slice(i,i+n); }
function scores(text){ const out={}; for(const l of LANGS){ const c=MODEL.counts[l], denom=MODEL.total[l]+MODEL.V; let s=MODEL.log_prior[l]; for(const g of grams(text)) s+=Math.log(((c[g]||0)+1)/denom); out[l]=s; } return out; }
function softmax(d){ const m=Math.max(...Object.values(d)); const e={}; let z=0; for(const k in d){e[k]=Math.exp(d[k]-m);z+=e[k];} for(const k in e)e[k]/=z; return e; }

function render(){
  const t=UI[ui];
  document.getElementById("tagline").textContent=t.tag;
  document.getElementById("by").textContent=t.by;
  document.getElementById("how").textContent=t.how;
  document.getElementById("tryl").textContent=t.tryl;
  document.getElementById("inp").placeholder=t.ph;
  // ui toggle
  const tog=document.getElementById("uitog"); tog.innerHTML="";
  for(const l of LANGS){ const b=document.createElement("button");
    b.textContent=DISP[l].flag+" "+DISP[l].name; if(l===ui)b.className="on";
    b.onclick=()=>{ui=l;render();detect();}; tog.appendChild(b); }
  // chips
  const ch=document.getElementById("chips"); ch.innerHTML="";
  for(const [l,s] of EXAMPLES){ const c=document.createElement("span"); c.className="chip";
    c.textContent=DISP[l].flag+" "+s.slice(0,26)+"…";
    c.onclick=()=>{document.getElementById("inp").value=s; detect();}; ch.appendChild(c); }
  detect();
}

function detect(){
  const text=document.getElementById("inp").value.trim();
  const box=document.getElementById("result");
  if(!text){ box.innerHTML='<div class="hint">'+UI[ui].hint+'</div>'; return; }
  const p=softmax(scores(text));
  const order=[...LANGS].sort((a,b)=>p[b]-p[a]); const top=order[0];
  let h='<div class="det"><div class="flag">'+DISP[top].flag+'</div>'+
    '<div><div class="name">'+DISP[top].name+'</div><div class="flair">'+(FLAIR[top]||"")+'</div></div>'+
    '<div class="pct">'+Math.round(p[top]*100)+'%</div></div>';
  for(const l of order){ h+='<div class="bar'+(l===top?' win':'')+'">'+
    '<div class="bl">'+DISP[l].flag+' '+DISP[l].name+'</div>'+
    '<div class="track"><div class="fill" style="width:'+(p[l]*100).toFixed(1)+'%"></div></div>'+
    '<div class="bp">'+(p[l]*100).toFixed(1)+'%</div></div>'; }
  box.innerHTML=h;
}

// cycling greeting
const GRT=["Xin chào","Bonjour","¡Hola!","Hello"]; let gi=0;
setInterval(()=>{ const g=document.getElementById("greet"); g.style.opacity=0;
  setTimeout(()=>{ gi=(gi+1)%GRT.length; g.textContent=GRT[gi]; g.style.opacity=1; },350); },2000);

document.getElementById("inp").addEventListener("input",detect);
render();
</script>
